<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - 商品详情</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a class="active" href="detail.html">商品详情</a>
                <a href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <main class="container page-main">
        <section class="detail-box">
            <div class="detail-image">
                <div class="big-product-img"><img src="images/phone.svg" alt="Xiaomi 15"></div>
            </div>

            <div class="detail-info">
                <h1>Xiaomi 15</h1>
                <p class="detail-desc">新一代旗舰手机，搭载高性能处理器，支持高清影像拍摄和长续航体验。</p>
                <p class="detail-price">3999 元起</p>

                <div class="option-group">
                    <h3>选择版本</h3>
                    <div class="option-list" data-option-group>
                        <button class="option-btn active" type="button">12GB + 256GB</button>
                        <button class="option-btn" type="button">12GB + 512GB</button>
                        <button class="option-btn" type="button">16GB + 1TB</button>
                    </div>
                </div>

                <div class="option-group">
                    <h3>选择颜色</h3>
                    <div class="option-list" data-option-group>
                        <button class="option-btn active" type="button">黑色</button>
                        <button class="option-btn" type="button">白色</button>
                        <button class="option-btn" type="button">绿色</button>
                    </div>
                </div>

                <div class="detail-actions">
                    <a class="buy-button" href="cart.html">加入购物车</a>
                    <a class="back-button" href="products.html">返回列表</a>
                </div>
            </div>
        </section>

        <section class="detail-params">
            <h2>商品参数</h2>
            <ul>
                <li>屏幕：高刷新率 OLED 屏幕</li>
                <li>处理器：旗舰性能处理器</li>
                <li>影像：高清主摄，支持多种拍摄模式</li>
                <li>续航：大容量电池，支持快速充电</li>
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">小米商城前端仿站实训项目</div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
