<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - Redmi Note 14 商品详情</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a class="active" href="detail-redmi-note-14.html">商品详情</a>
                <a href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <main class="container page-main">
        <section class="detail-box">
            <div class="detail-image">
                <div class="big-product-img">
                    <img class="phone-img" src="images/redmi-note14-blue.png" alt="Redmi Note 14">
                </div>
            </div>
            <div class="detail-info">
                <h1>Redmi Note 14</h1>
                <p class="detail-desc">真抗摔，真防水，长续航，适合日常学习、通勤和娱乐使用。</p>
                <p class="detail-price">1349 元起</p>
                <div class="option-group">
                    <h3>选择版本</h3>
                    <div class="option-list">
                        <button class="option-btn active" type="button">12GB + 256GB</button>
                        <button class="option-btn" type="button">12GB + 512GB</button>
                        <button class="option-btn" type="button">16GB + 1TB</button>
                    </div>
                </div>
                <div class="option-group">
                    <h3>选择颜色</h3>
                    <div class="option-list">
                        <button class="option-btn active" type="button" data-img="images/redmi-note14-blue.png">天青蓝</button>
                        <button class="option-btn" type="button" data-img="images/redmi-note14-white.png">雪松白</button>
                        <button class="option-btn" type="button" data-img="images/redmi-note14-black.png">子午黑</button>
                    </div>
                </div>
                <div class="detail-actions">
                    <a class="buy-button" href="cart.html" data-cart-action="add" data-id="redmi-note-14" data-name="Redmi Note 14" data-desc="真抗摔，真防水，长续航" data-price="1349" data-image="images/redmi-note14-blue.png">加入购物车</a>
                    <a class="back-button" href="products.html">返回列表</a>
                </div>
            </div>
        </section>

        <section class="detail-params">
            <h2>商品参数</h2>
            <ul>
                <li>小米龙晶玻璃</li>
                <li>防水大满贯</li>
                <li>四窄边直屏设计</li>
                <li>1.5K 超级阳光屏</li>
                <li>7000mAh 小米金沙江电池</li>
                <li>天玑 7400-Ultra AI 性能芯</li>
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">小米商城前端仿站实训项目</div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
