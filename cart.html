<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - 购物车</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a href="detail-xiaomi-15.html">商品详情</a>
                <a class="active" href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <main class="container page-main">
        <section class="page-title">
            <h1>购物车</h1>
            <p>确认商品信息、调整数量，满意后即可结算。</p>
        </section>

        <section class="cart-content" id="cartContent" style="display:none;">
            <div class="cart-header">
                <span class="cart-col-check"></span>
                <span class="cart-col-product">商品信息</span>
                <span class="cart-col-price">单价</span>
                <span class="cart-col-qty">数量</span>
                <span class="cart-col-subtotal">小计</span>
            </div>

            <div class="cart-list" id="cartList"></div>

            <div class="cart-footer">
                <div class="cart-footer-left">
                    <span class="cart-total-label">已选 <em id="checkedCount">0</em> 件，合计：</span>
                    <span class="cart-total-price" id="cartTotal">¥0</span>
                </div>
                <div class="cart-footer-right">
                    <a class="btn btn-outline" href="products.html">继续购物</a>
                    <button type="button" class="btn btn-primary" id="checkoutBtn">去结算</button>
                </div>
            </div>
        </section>

        <section class="cart-empty" id="cartEmpty">
            <div class="cart-empty-icon" aria-hidden="true">🛒</div>
            <h2>购物车是空的</h2>
            <p>快去挑选心仪的商品吧</p>
            <a class="btn btn-primary" href="products.html">去逛逛</a>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">小米商城 · 智能生活精选</div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
