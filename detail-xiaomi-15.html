<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - Xiaomi 15 商品详情</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a class="active" href="detail-xiaomi-15.html">商品详情</a>
                <a href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <main class="container page-main">
        <section class="detail-box">
            <div class="detail-image">
                <div class="big-product-img">
                    <img class="phone-img" src="images/xiaomi-15-black.png" alt="Xiaomi 15">
                </div>
            </div>
            <div class="detail-info">
                <h1>Xiaomi 15</h1>
                <p class="detail-desc">新一代旗舰手机，搭载高性能处理器，支持高清影像拍摄和长续航体验。</p>
                <p class="detail-price">3999 元起</p>
                <div class="option-group">
                    <h3>选择版本</h3>
                    <div class="option-list">
                        <button class="option-btn active" type="button">12GB + 256GB</button>
                        <button class="option-btn" type="button">12GB + 512GB</button>
                        <button class="option-btn" type="button">16GB + 1TB</button>
                    </div>
                </div>
                <div class="option-group">
                    <h3>选择颜色</h3>
                    <div class="option-list">
                        <button class="option-btn active" type="button" data-image="images/xiaomi-15-black.png">黑色</button>
                        <button class="option-btn" type="button" data-image="images/xiaomi-15-green.png">绿色</button>
                        <button class="option-btn" type="button" data-image="images/xiaomi-15-white.png">白色</button>
                    </div>
                </div>
                <div class="detail-actions">
                    <a class="buy-button" href="cart.html">加入购物车</a>
                    <a class="back-button" href="products.html">返回列表</a>
                </div>
            </div>
        </section>

        <section class="detail-params">
            <h2>商品参数</h2>
            <ul>
                <li>骁龙 8 Elite 移动平台</li>
                <li>徕卡光学 Summilux 高速镜头</li>
                <li>1.5K 超视感屏，120Hz 高刷新率</li>
                <li>5400mAh 大电池，90W 有线充 + 50W 无线充</li>
                <li>IP68 级防尘防水</li>
                <li>小米澎湃 OS 2</li>
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">小米商城 · 智能生活精选</div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/detail.js"></script>
</body>
</html>
