<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-image: url('images/45890f461b8de74d192efe0465908b15.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-page {
            width: 860px;
            margin: 60px auto;
            display: flex;
            height: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .login-left {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            text-align: center;
            padding: 60px 30px;
        }

        .login-left h1 {
            font-size: 36px;
            margin-top: 100px;
        }

        .login-left p {
            font-size: 18px;
            margin-top: 10px;
        }

        .login-right {
            width: 400px;
            padding: 50px 40px;
            background-color: #fff;
        }

        .login-right h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            color: #333;
        }

        .login-right label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }

        .login-right input[type="text"],
        .login-right input[type="password"] {
            width: 100%;
            height: 40px;
            margin-bottom: 18px;
            padding: 0 12px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .login-right input[type="checkbox"] {
            margin-right: 6px;
        }

        .login-right .remember {
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-right button {
            width: 100%;
            height: 44px;
            background-color: #ff6700;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .login-right button:hover {
            background-color: #e55e00;
        }

        .login-right .message {
            margin-top: 12px;
            text-align: center;
            color: red;
            font-size: 14px;
        }

        .login-right .register {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }

        .login-right .register a {
            color: #ff6700;
        }

        .login-right .forgot {
            float: right;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a href="detail.html">商品详情</a>
                <a href="cart.html">购物车</a>
                <a class="active" href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <div class="login-page">
        <div class="login-left">
            <h1>小米商城</h1>
            <p>让每个人都能享受科技的乐趣</p>
        </div>

        <div class="login-right">
            <h2>账号登录</h2>

            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名或手机号">

            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">

            <div class="remember">
                <a href="#" class="forgot">忘记密码？</a>
                <input type="checkbox" id="rememberMe"> 记住密码
            </div>

            <button type="button" id="loginBtn">登录</button>

            <p class="message" id="loginMessage"></p>

            <p class="register">
                还没有账号？<a href="login.html">立即注册</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>

    <script>
        document.getElementById('loginBtn').onclick = function() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var msg = document.getElementById('loginMessage');

            if (username === '') {
                msg.innerText = '请输入用户名或手机号';
                return;
            }
            if (password === '') {
                msg.innerText = '请输入密码';
                return;
            }
            if (password.length < 6) {
                msg.innerText = '密码长度不能少于6位';
                return;
            }

            msg.style.color = 'green';
            msg.innerText = '登录成功，正在跳转...';
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 1000);
        };

        document.getElementById('username').oninput = function() {
            document.getElementById('loginMessage').innerText = '';
            document.getElementById('loginMessage').style.color = 'red';
        };
        document.getElementById('password').oninput = function() {
            document.getElementById('loginMessage').innerText = '';
            document.getElementById('loginMessage').style.color = 'red';
        };
    </script>

</body>
</html>
