<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a href="detail-xiaomi-15.html">商品详情</a>
                <a href="cart.html">购物车</a>
                <a class="active" href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <div class="login-page">
        <div class="login-left">
            <h1>小米商城</h1>
            <p>让每个人都能享受科技的乐趣</p>
        </div>

        <div class="login-right">
            <h2>账号登录</h2>

            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名或手机号">

            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">

            <div class="remember">
                <a href="#" class="forgot">忘记密码？</a>
                <input type="checkbox" id="rememberMe"> 记住密码
            </div>

            <button type="button" id="loginBtn">登录</button>

            <p class="message" id="loginMessage"></p>

            <p class="register">
                还没有账号？<a href="login.html">立即注册</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>

</body>
</html>
