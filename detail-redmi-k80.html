<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a class="active" href="detail-redmi-k80.html">商品详情</a>
                <a href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <main class="container page-main">
        <section class="detail-box">
            <div class="detail-image">
                <div class="big-product-img">
                    <img class="phone-img" src="images/redmi-k80-main.png" alt="Redmi K80">
                </div>
            </div>
            <div class="detail-info">
                <h1>Redmi K80</h1>
                <p class="detail-desc">双芯旗舰，狂暴登场！天玑 9300+ 搭档狂暴游戏独显 D1 芯片，依托狂暴引擎 3.0 贯穿双芯调校。</p>
                <p class="detail-price">2249 元起</p>
                <div class="option-group">
                    <h3>选择版本</h3>
                    <div class="option-list">
                        <button class="option-btn active" type="button">12GB + 256GB</button>
                        <button class="option-btn" type="button">12GB + 512GB</button>
                        <button class="option-btn" type="button">16GB + 1TB</button>
                    </div>
                </div>
                <div class="option-group">
                    <h3>选择颜色</h3>
                    <div class="option-list">
                        <button class="option-btn active" type="button" data-image="images/redmi-k80-main.png">黑色</button>
                        <button class="option-btn" type="button" data-image="images/redmi-k80-green.png">绿色</button>
                        <button class="option-btn" type="button" data-image="images/redmi-k80-white.png">白色</button>
                    </div>
                </div>
                <div class="detail-actions">
                    <a class="buy-button" href="cart.html">加入购物车</a>
                    <a class="back-button" href="products.html">返回列表</a>
                </div>
            </div>
        </section>

        <section class="detail-params">
            <h2>商品参数</h2>
            <ul>
                <li>天玑 9300+ 旗舰平台</li>
                <li>定制狂暴游戏独显 D1 芯片</li>
                <li>新一代 1.5K 旗舰直屏</li>
                <li>小米青山护眼</li>
                <li>IP68 防尘防水</li>
                <li>120W + 5500mAh 续航组合</li>
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">小米商城 · 智能生活精选</div>
    </footer>

    <script src="js/main.js"></script>
