<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城 - 小米电视 S Pro 商品详情</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-box">
            <a class="logo" href="index.html">小米商城</a>
            <nav class="main-nav">
                <a href="index.html">首页</a>
                <a href="products.html">全部商品</a>
                <a href="detail.html">小米15</a>
                <a href="detail2.html">Redmi K80</a>
                <a href="detail3.html">Redmi Note 14</a>
                <a class="active" href="detail4.html">小米电视 S Pro</a>
                <a href="detail5.html">Redmi Book Pro</a>
                <a href="detail6.html">Xiaomi Pad 7</a>
                <a href="cart.html">购物车</a>
                <a href="login.html">登录</a>
            </nav>
        </div>
    </header>

    <main class="container page-main">
        <section class="detail-box">
            <div class="detail-image">
                <div class="big-product-img"><img src="images\电视.png" alt="小米电视 S Pro" class="phone-img"></div>
            </div>

            <div class="detail-info">
                <h1>小米电视 S pro</h1>
                <p class="detail-desc">小米电视首发低反屏，超薄一体化机身，Mini LED 画质新旗舰，288Hz超高刷</p>
                <p class="detail-price">2699元起</p>

                <div class="option-group">
                    <h3>选择能耗等级</h3>
                    <div class="option-list" data-group="ram">
                        <button class="option-btn active" type="button">1级</button>
                    </div>
                </div>

                <div class="option-group">
                    <h3>选择尺寸</h3>
                    <div class="option-list" data-group="color">
                        <button class="option-btn active" type="button" data-img="images\电视.png">55英寸</button>
                        <button class="option-btn" type="button" data-img="images\电视.png">65英寸</button>
                        <button class="option-btn" type="button" data-img="images\电视.png">75英寸</button>
                        <button class="option-btn" type="button" data-img="images\电视.png">85英寸</button>
                        <button class="option-btn" type="button" data-img="images\电视.png">98英寸</button>
                    </div>
                </div>

                <div class="detail-actions">
                    <a class="buy-button" href="cart.html">加入购物车</a>
                    <a class="back-button" href="products.html">返回列表</a>
                </div>
            </div>
        </section>

        <section class="detail-params">
            <h2>商品参数</h2>
            <ul>
                <li>Mini LED 画质新旗舰</li>
                <li>低反屏</li>
                <li>大师画质引擎2.0</li>
                <li>小米青山护眼</li>
                <li>超薄一体化机身</li>
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">小米商城前端仿站实训项目</div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
